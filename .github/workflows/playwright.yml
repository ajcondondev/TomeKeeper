name: Playwright Smoke Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs for the same branch so a fast-follow push doesn't
# queue behind a slow run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # package-lock.json was generated on Windows and contains no resolved entry
      # for @rollup/rollup-linux-x64-gnu. Both npm ci and npm install honour the
      # lockfile when it exists, so the Linux binary is never installed and Vite
      # fails on startup. Removing the lockfile forces npm to do a full
      # resolution for the current platform, which includes the Linux binary.
      # The ~/.npm tarball cache (restored by setup-node above) keeps this fast.
      # See: https://github.com/npm/cli/issues/4828
      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      # .env is gitignored; .env.example contains the correct CI defaults.
      - name: Create e2e environment file
        run: cp e2e/.env.example e2e/.env

      - name: Run smoke tests
        run: npx playwright test --grep "@smoke" --project=chromium
        working-directory: e2e

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke-${{ github.run_id }}
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload traces and screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results-smoke-${{ github.run_id }}
          path: e2e/test-results/
          retention-days: 30
