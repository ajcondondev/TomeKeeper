name: Playwright Smoke Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs for the same branch so a fast-follow push doesn't
# queue behind a slow run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # npm ci is intentionally avoided here: package-lock.json is generated on
      # Windows and does not contain a resolved entry for the Linux-specific
      # Rollup native binary (@rollup/rollup-linux-x64-gnu). npm ci installs
      # exactly what is in the lockfile and skips platform-specific optionals
      # that were never recorded there, causing Vite's bundler to fail at
      # startup. npm install resolves optional native deps for the current
      # platform at install time while still honouring the lockfile for all
      # other packages.
      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      # .env is gitignored; .env.example contains the correct CI defaults.
      - name: Create e2e environment file
        run: cp e2e/.env.example e2e/.env

      - name: Run smoke tests
        run: npx playwright test --grep "@smoke" --project=chromium
        working-directory: e2e

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke-${{ github.run_id }}
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload traces and screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results-smoke-${{ github.run_id }}
          path: e2e/test-results/
          retention-days: 30
